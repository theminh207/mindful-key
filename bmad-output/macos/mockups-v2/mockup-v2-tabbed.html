<title>Mindful-key — Popover tab (v2)</title>
<style>
  :root{--ink:#1D2A2C;--muted:#66767A;--stone:#8A9BA0;--teal:#1D7C91;--teal-deep:#0F5566;
    --orange:#FF7A1A;--track:#EEF1F1;--card:#FFF;--border:#E6ECEC;--bg:#E7EEEE;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;}
  @media (prefers-color-scheme:dark){:root{--bg:#101E20}}
  :root[data-theme="dark"]{--bg:#101E20}:root[data-theme="light"]{--bg:#E7EEEE}
  *{box-sizing:border-box}body{margin:0}
  .page{background:var(--bg);font-family:var(--sans);padding:28px 16px 70px;min-height:100vh}
  .wrap{max-width:820px;margin:0 auto}
  .intro{max-width:60ch;margin:0 auto 22px;text-align:center;color:var(--muted);font-size:14px}
  .intro b{color:var(--ink)}
  :root[data-theme="dark"] .intro b,.dark .intro b{color:#E7EEEE}
  @media (prefers-color-scheme:dark){.intro b{color:#E7EEEE}}
  .stage{display:flex;justify-content:center;gap:26px;flex-wrap:wrap}
  .pop{width:352px;background:var(--card);border-radius:15px;box-shadow:0 16px 46px rgba(20,50,58,.22);
    overflow:hidden;border:1px solid #E4EAEA;color:var(--ink)}
  .top{display:flex;align-items:center;gap:8px;padding:13px 16px 0}
  .top .mk{font-weight:600;font-size:14px}.top .w{color:var(--teal);font-weight:700;font-size:17px;line-height:1}
  .vn{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--teal-deep);background:#E8F2F4;padding:2px 9px;border-radius:999px;letter-spacing:.05em}
  .tabs{display:flex;background:var(--track);border-radius:9px;padding:3px;margin:12px 16px 0;gap:2px}
  .tabs button{flex:1;border:0;background:none;font:500 12.5px var(--sans);color:#6A7779;padding:7px 6px;border-radius:7px;cursor:pointer}
  .tabs button.on{background:#fff;color:#12292C;box-shadow:0 1px 2px rgba(0,0,0,.09)}
  .body{padding:16px}
  .eb{font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--stone);margin:0 0 8px}
  .card{background:#fff;border:1px solid var(--border);border-radius:11px;padding:13px 14px;margin-bottom:16px}
  .card:last-child{margin-bottom:0}
  .sg{display:flex;background:var(--track);border-radius:9px;padding:3px;gap:2px}
  .sg span{flex:1;text-align:center;padding:6px 4px;border-radius:7px;font-size:12px;color:#6A7779;cursor:pointer;user-select:none}
  .sg span.on{background:#fff;color:#12292C;box-shadow:0 1px 2px rgba(0,0,0,.09);font-weight:500}
  .rowl{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px}
  .rowl+.rowl{margin-top:11px}
  .lab{color:#3C4A4C}
  .note{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:9px;display:flex;gap:6px;align-items:flex-start}
  .note svg{flex:0 0 auto;margin-top:1px}
  .dd{border:1px solid #DDE4E4;border-radius:7px;padding:5px 11px;font-size:12.5px;background:#F8FAFA;display:flex;gap:14px;align-items:center}
  .fld{border:1px solid #DDE4E4;border-radius:6px;padding:4px 10px;font-size:12.5px;background:#fff}
  .sw{width:38px;height:22px;border-radius:999px;position:relative;flex:0 0 auto;cursor:pointer}
  .sw i{position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:all .15s}
  .sw.on{background:var(--teal)}.sw.on i{right:2px}.sw.off{background:#D3D6D6}.sw.off i{left:2px}
  .slider{flex:1;height:4px;border-radius:2px;background:#DBE1E1;position:relative;max-width:150px}
  .slider b{position:absolute;left:0;top:0;height:4px;border-radius:2px;background:var(--teal)}
  .slider u{position:absolute;top:-7px;width:18px;height:18px;border-radius:50%;background:#fff;border:1px solid #CBD4D4}
  .state{font-size:16px;font-weight:600;margin:2px 0 2px}
  .lnk{color:var(--orange);font-size:12.5px;font-weight:500;cursor:pointer;text-decoration:none}
  .lnk.teal{color:var(--teal-deep)}
  .foot{padding:11px 16px;font-size:11px;color:var(--stone);border-top:1px solid #EFF2F2;text-align:center}
  .cap{font-size:11.5px;color:var(--stone)}
  .caption{text-align:center;font-size:12.5px;color:var(--muted);margin-top:12px}
  button:focus-visible,.sw:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
</style>
<div class="page"><div class="wrap">
  <p class="intro">Bản popover mới: bỏ cuộn dài, <b>chia tab từng module</b> kiểu Haynoi. Và <b>chuông + nhịp cảm xúc thành một hệ thống</b> — mỗi nhịp chuông là một điểm ghi lên dòng sông.</p>
  <div class="stage">
    <div class="pop">
      <div class="top"><span class="w">~</span><span class="mk">mindful-key</span><span class="vn">VN</span></div>
      <div class="tabs" id="tabs">
        <button class="on" data-k="today">Hôm nay</button>
        <button data-k="bell">Chuông</button>
        <button data-k="input">Bộ gõ</button>
      </div>
      <div class="body" id="body"></div>
      <div class="foot">Xử lý trên máy · không gửi nội dung gõ đi đâu</div>
    </div>
  </div>
  <p class="caption">Bấm 3 tab để chuyển module — mỗi tab vừa một màn, không phải cuộn dài.</p>
</div></div>
<script>
(function(){
  var teal="#1D7C91",stone="#8A9BA0";
  function riverMarks(amps,w,h,marks){var mid=h/2,pts=[],k=amps.length;for(var x=0;x<=w;x+=3){var f=x/w*(k-1),i=Math.floor(f),fr=f-i;var a=amps[i]+((amps[Math.min(i+1,k-1)]||amps[i])-amps[i])*fr;var y=mid-a*Math.sin(x*0.19);pts.push([x,y]);}
    var poly='<polyline points="'+pts.map(function(p){return p[0].toFixed(1)+","+p[1].toFixed(1);}).join(" ")+'" fill="none" stroke="'+teal+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>';
    var dots="";if(marks){for(var m=0;m<marks;m++){var mx=(m+0.5)/marks*w;var idx=Math.round(mx/3);var pt=pts[Math.min(idx,pts.length-1)];dots+='<circle cx="'+pt[0].toFixed(1)+'" cy="'+pt[1].toFixed(1)+'" r="2.6" fill="#fff" stroke="'+teal+'" stroke-width="1.6"/>';}}
    return '<svg width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" aria-hidden="true">'+poly+dots+'</svg>';}
  function wave(w,h,amp,col){var mid=h/2,pts=[];for(var x=0;x<=w;x+=3){pts.push(x+","+(mid-amp*Math.sin(x*0.22)).toFixed(1));}return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" aria-hidden="true"><polyline points="'+pts.join(" ")+'" fill="none" stroke="'+(col||teal)+'" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
  var bellIco='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+stone+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9M10.3 21a1.9 1.9 0 003.4 0"/></svg>';
  var linkIco='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="'+stone+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 15l6-6M10 6l1-1a4 4 0 016 6l-1 1M14 18l-1 1a4 4 0 01-6-6l1-1"/></svg>';

  var T={};
  T.today=''+
    '<p class="eb">Ngay bây giờ</p>'+
    '<div class="card">'+
      '<div style="margin:2px 0 6px">'+wave(150,26,5)+'</div>'+
      '<div class="state">Mặt hồ đang gợn nhẹ</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">'+
        '<span class="cap">Gác cổng đang canh khi anh gõ</span><span class="lnk">Soi lại hôm nay &rarr;</span></div>'+
    '</div>'+
    '<p class="eb">Hôm nay</p>'+
    '<div class="card">'+
      riverMarks([3,2,4,3,6,10,8,5,3],300,60,6)+
      '<div style="display:flex;justify-content:space-between;font-size:10.5px;color:'+stone+';margin-top:4px"><span>Sáng</span><span>Trưa</span><span>Chiều</span><span>Tối</span></div>'+
      '<div class="note">'+linkIco+'<span>Mỗi vòng tròn là một nhịp chuông — lúc app lặng lẽ ghi một điểm. Gợn nhiều nhất vào <b>cuối chiều</b>.</span></div>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:'+stone+'">'+bellIco+'<span>Chuông tỉnh thức kế tiếp: còn <b style="color:#3C4A4C">18 phút</b></span></div>';

  T.bell=''+
    '<p class="eb">Nhịp</p>'+
    '<div class="card">'+
      '<div class="rowl"><span class="lab">Chuông định kỳ mỗi</span></div>'+
      '<div class="sg" style="margin-top:9px" data-sg><span>15</span><span class="on">30</span><span>60</span></div>'+
      '<div class="note">'+linkIco+'<span>Cứ mỗi nhịp chuông, app ghi một điểm lên <b>dòng sông cảm xúc</b> ở tab Hôm nay. Một nhịp, hai vai.</span></div>'+
    '</div>'+
    '<p class="eb">Nhận diện</p>'+
    '<div class="card">'+
      '<div class="rowl"><span class="lab">Độ nhạy</span><span>'+wave(64,18,4)+'</span></div>'+
      '<div class="sg" style="margin-top:9px" data-sg><span>Ít nhạy</span><span class="on">Vừa</span><span>Nhạy</span></div>'+
      '<div class="note">'+linkIco+'<span>Quyết định khi nào mặt hồ được coi là gợn — <b>dùng chung</b> cho gác cổng gửi tin và chuông.</span></div>'+
    '</div>'+
    '<p class="eb">Âm thanh</p>'+
    '<div class="card">'+
      '<div class="rowl"><span class="lab">Bộ tiếng</span></div>'+
      '<div class="sg" style="margin-top:9px" data-sg><span class="on">Chuông chùa</span><span>Chuông gió</span><span>Im</span></div>'+
      '<div class="rowl" style="margin-top:12px"><span class="lab">Âm lượng</span><span class="slider"><b style="width:72%"></b><u style="left:68%"></u></span></div>'+
    '</div>'+
    '<p class="eb">Yên lặng</p>'+
    '<div class="card">'+
      '<div class="rowl"><span class="lab">Giờ yên lặng</span><span style="display:flex;align-items:center;gap:7px"><span class="fld">22:00</span>&rarr;<span class="fld">08:00</span></span></div>'+
      '<div class="rowl" style="margin-top:11px"><span class="lab">Đồng bộ Chế độ Tập trung</span><span class="sw off" data-tog><i></i></span></div>'+
    '</div>';

  T.input=''+
    '<p class="eb">Kiểu gõ</p>'+
    '<div class="card">'+
      '<div class="sg" data-sg><span class="on">Telex</span><span>VNI</span><span>Đơn giản</span></div>'+
      '<div class="rowl" style="margin-top:12px"><span class="lab">Bảng mã</span><span class="dd">Unicode <span style="color:'+stone+'">&#8645;</span></span></div>'+
    '</div>'+
    '<p class="eb">Tùy chọn</p>'+
    '<div class="card">'+
      '<div class="rowl"><span class="lab" style="font-weight:500;color:#12292C">Gõ tiếng Việt</span><span class="sw on" data-tog><i></i></span></div>'+
      '<div class="rowl" style="margin-top:11px"><span class="lab">Kiểm tra chính tả</span><span class="sw on" data-tog><i></i></span></div>'+
      '<div class="rowl" style="margin-top:11px"><span class="lab">Viết hoa đầu câu</span><span class="sw on" data-tog><i></i></span></div>'+
      '<div class="rowl" style="margin-top:11px"><span class="lab">Chuyển chế độ thông minh</span><span class="sw on" data-tog><i></i></span></div>'+
      '<div class="rowl" style="margin-top:11px"><span class="lab">Gõ tắt (macro)</span><span class="sw on" data-tog><i></i></span></div>'+
    '</div>'+
    '<div style="text-align:center"><span class="lnk teal">Cài đặt đầy đủ &rarr;</span></div>';

  var body=document.getElementById("body");
  function wire(){
    body.querySelectorAll("[data-sg]").forEach(function(sg){sg.querySelectorAll("span").forEach(function(s){s.addEventListener("click",function(){sg.querySelectorAll("span").forEach(function(x){x.classList.remove("on");});s.classList.add("on");});});});
    body.querySelectorAll("[data-tog]").forEach(function(t){t.addEventListener("click",function(){t.classList.toggle("on");t.classList.toggle("off");});});
  }
  function set(k){body.innerHTML=T[k];wire();}
  set("today");
  document.querySelectorAll("#tabs button").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll("#tabs button").forEach(function(x){x.classList.remove("on");});b.classList.add("on");set(b.getAttribute("data-k"));});});
})();
</script>
