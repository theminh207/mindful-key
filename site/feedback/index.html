<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gửi phản hồi — Mindful Key</title>
<meta name="description" content="Gửi góp ý, báo lỗi hoặc câu hỏi cho đội Mindful Key. Mỗi phản hồi được ghi nhận và chuyển tới đội phụ trách." />
<style>
  :root{
    --bg:#f2f7f4; --card:#fff; --brand:#1f9d63; --brand-dark:#157a4c; --brand-soft:#e7f4ec;
    --teal:#1C8C86; --teal-dark:#136f6a;
    --ink:#1e2a24; --ink-soft:#5c6b63; --line:#e3ebe6;
    --bot-bubble:#eef4f1; --user-bubble:#1f9d63;
    --shadow:0 18px 50px rgba(24,80,52,.14); --radius:20px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#e2f1e8 0%,var(--bg) 55%);
    color:var(--ink);min-height:100%;display:flex;flex-direction:column;align-items:center;padding:36px 16px 48px;
  }
  .hero{max-width:560px;text-align:center;margin-bottom:22px}
  .brandmark{width:78px;height:78px;margin:0 auto 14px}
  .brandmark svg{width:100%;height:100%;display:block}
  .tag{display:inline-flex;align-items:center;gap:8px;background:var(--brand-soft);color:var(--brand-dark);
    font-weight:600;font-size:13px;padding:6px 14px;border-radius:999px;margin-bottom:14px}
  .tag .dot{width:8px;height:8px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px rgba(31,157,99,.18)}
  .hero h1{font-size:26px;line-height:1.25;margin:0 0 8px}
  .hero p{color:var(--ink-soft);margin:0;font-size:15px;line-height:1.5}

  .chat{width:100%;max-width:440px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden;display:flex;flex-direction:column;height:min(620px,74vh)}
  .chat-head{display:flex;align-items:center;gap:12px;padding:14px 18px;
    background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dark) 100%);color:#fff}
  .avatar{width:42px;height:42px;border-radius:50%;background:#fff;padding:3px;display:grid;place-items:center;flex:0 0 auto}
  .avatar svg{width:100%;height:100%;display:block}
  .chat-head .title{font-weight:700;font-size:15px;line-height:1.2}
  .chat-head .status{font-size:12px;opacity:.9;display:flex;align-items:center;gap:6px;margin-top:2px}
  .chat-head .status i{width:7px;height:7px;border-radius:50%;background:#8ff0b8;display:inline-block}

  .stream{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:12px;background:#fafcfb}
  .row{display:flex;gap:8px;align-items:flex-end;max-width:88%}
  .row.bot{align-self:flex-start}
  .row.user{align-self:flex-end;flex-direction:row-reverse}
  .mini{width:26px;height:26px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:14px;flex:0 0 auto;overflow:hidden}
  .mini svg{width:100%;height:100%;display:block}
  .bubble{padding:10px 14px;border-radius:16px;font-size:14.5px;line-height:1.45}
  .row.bot .bubble{background:var(--bot-bubble);color:var(--ink);border-bottom-left-radius:5px}
  .row.user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:5px}
  .bubble b{font-weight:700}

  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 4px}
  .chip{border:1.5px solid var(--brand);color:var(--brand-dark);background:#fff;padding:8px 14px;border-radius:999px;
    font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
  .chip:hover{background:var(--brand);color:#fff}

  .composer{border-top:1px solid var(--line);padding:12px;display:flex;gap:8px;align-items:flex-end;background:#fff}
  .composer textarea{flex:1;border:1.5px solid var(--line);border-radius:14px;padding:10px 12px;font-family:inherit;
    font-size:14.5px;resize:none;max-height:110px;outline:none;line-height:1.4}
  .composer textarea:focus{border-color:var(--brand)}
  .send{width:42px;height:42px;border:none;border-radius:12px;background:var(--brand);color:#fff;font-size:18px;
    cursor:pointer;flex:0 0 auto;display:grid;place-items:center;transition:.15s}
  .send:hover{background:var(--brand-dark)}
  .send:disabled{opacity:.4;cursor:not-allowed}

  .typing{display:flex;gap:4px;padding:12px 14px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#b6c9bf;animation:bob 1s infinite}
  .typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
  @keyframes bob{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

  .ticket{align-self:center;background:#fff;border:1.5px dashed var(--brand);border-radius:16px;padding:16px 18px;text-align:center;width:92%}
  .ticket .tid{font-size:20px;font-weight:800;color:var(--brand-dark);letter-spacing:.5px;margin:4px 0}
  .ticket small{color:var(--ink-soft)}
  .footer{margin-top:18px;font-size:12px;color:var(--ink-soft);text-align:center;max-width:420px}
  .footer a{color:var(--teal-dark);text-decoration:none}
</style>
</head>
<body>
  <div class="hero">
    <div class="brandmark" id="brandmark"></div>
    <span class="tag"><span class="dot"></span> Trang gửi phản hồi</span>
    <h1>Góp ý của bạn giúp Mindful Key tốt hơn</h1>
    <p>Trò chuyện với trợ lý bên dưới. Mỗi phản hồi được ghi thành một phiếu và chuyển tới đội phụ trách.</p>
  </div>

  <div class="chat">
    <div class="chat-head">
      <div class="avatar" id="headAvatar"></div>
      <div>
        <div class="title">Trợ lý Ghi nhận phản hồi</div>
        <div class="status"><i></i> Đang trực tuyến</div>
      </div>
    </div>
    <div class="stream" id="stream"></div>
    <div class="chips" id="chips"></div>
    <div class="composer" id="composer">
      <textarea id="input" rows="1" placeholder="Nhập tin nhắn…"></textarea>
      <button class="send" id="send" title="Gửi">➤</button>
    </div>
  </div>

  <p class="footer">🔒 Thông tin của bạn chỉ dùng để xử lý phản hồi. · <a href="/">Về trang chủ Mindful Key</a></p>

<script>
/* ============================================================
   CẤU HÌNH — URL Web App của Google Apps Script
   ============================================================ */
const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbyR6PMbjmWwRf_zTHCQ5i7Ypt1He3rPHGL9uCwflObKqnQMFZIfaZjXc9ALrkedCWw9fA/exec";

const GNH_LOGO = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <circle id="g-lobe" cx="100" cy="56" r="44" fill="#1C8C86"/>
    <path id="g-c" d="M100 100 C120 62 120 40 100 22 C80 40 80 62 100 100 Z" fill="#A8DCE0"/>
    <path id="g-y" d="M100 100 C113 66 113 48 100 32 C87 48 87 66 100 100 Z" fill="#F5B720"/>
    <path id="g-s" d="M100 100 C105 84 105 78 100 72 C95 78 95 84 100 100 Z" fill="#F5B720"/>
  </defs>
  <g stroke="#fff" stroke-width="2" stroke-linejoin="round">
    <use href="#g-lobe" transform="rotate(0 100 100)"/><use href="#g-lobe" transform="rotate(45 100 100)"/>
    <use href="#g-lobe" transform="rotate(90 100 100)"/><use href="#g-lobe" transform="rotate(135 100 100)"/>
    <use href="#g-lobe" transform="rotate(180 100 100)"/><use href="#g-lobe" transform="rotate(225 100 100)"/>
    <use href="#g-lobe" transform="rotate(270 100 100)"/><use href="#g-lobe" transform="rotate(315 100 100)"/>
  </g>
  <g stroke="#fff" stroke-width="1.6" stroke-linejoin="round">
    <use href="#g-c" transform="rotate(22.5 100 100)"/><use href="#g-c" transform="rotate(67.5 100 100)"/>
    <use href="#g-c" transform="rotate(112.5 100 100)"/><use href="#g-c" transform="rotate(157.5 100 100)"/>
    <use href="#g-c" transform="rotate(202.5 100 100)"/><use href="#g-c" transform="rotate(247.5 100 100)"/>
    <use href="#g-c" transform="rotate(292.5 100 100)"/><use href="#g-c" transform="rotate(337.5 100 100)"/>
  </g>
  <g stroke="#fff" stroke-width="1.6" stroke-linejoin="round">
    <use href="#g-y" transform="rotate(0 100 100)"/><use href="#g-y" transform="rotate(45 100 100)"/>
    <use href="#g-y" transform="rotate(90 100 100)"/><use href="#g-y" transform="rotate(135 100 100)"/>
    <use href="#g-y" transform="rotate(180 100 100)"/><use href="#g-y" transform="rotate(225 100 100)"/>
    <use href="#g-y" transform="rotate(270 100 100)"/><use href="#g-y" transform="rotate(315 100 100)"/>
  </g>
  <g stroke="#fff" stroke-width="1.4" stroke-linejoin="round">
    <use href="#g-s" transform="rotate(0 100 100)"/><use href="#g-s" transform="rotate(45 100 100)"/>
    <use href="#g-s" transform="rotate(90 100 100)"/><use href="#g-s" transform="rotate(135 100 100)"/>
    <use href="#g-s" transform="rotate(180 100 100)"/><use href="#g-s" transform="rotate(225 100 100)"/>
    <use href="#g-s" transform="rotate(270 100 100)"/><use href="#g-s" transform="rotate(315 100 100)"/>
  </g>
  <circle cx="100" cy="100" r="5.5" fill="#1C8C86" stroke="#fff" stroke-width="1.4"/>
</svg>`;

const stream=document.getElementById('stream'), chipsBox=document.getElementById('chips'),
      input=document.getElementById('input'), sendBtn=document.getElementById('send');
const ticket={type:'',content:'',name:'',contact:''};
let step=0;
const CATEGORIES=['Góp ý / Đề xuất','Báo lỗi','Câu hỏi','Khiếu nại','Khen ngợi'];

function scrollDown(){ stream.scrollTop=stream.scrollHeight; }
function addBubble(text,who='bot'){
  const row=document.createElement('div'); row.className='row '+who;
  row.innerHTML=(who==='bot'?'<div class="mini">'+GNH_LOGO+'</div>':'<div class="mini">B</div>')+'<div class="bubble">'+text+'</div>';
  stream.appendChild(row); scrollDown();
}
function typing(){
  const row=document.createElement('div'); row.className='row bot'; row.id='typing';
  row.innerHTML='<div class="mini">'+GNH_LOGO+'</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  stream.appendChild(row); scrollDown();
}
function stopTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }
function botSay(text,after){ typing(); setTimeout(()=>{ stopTyping(); addBubble(text,'bot'); if(after) after(); },650); }
function showChips(options){
  chipsBox.innerHTML='';
  options.forEach(opt=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=opt;
    b.onclick=()=>{ clearChips(); handleUser(opt); }; chipsBox.appendChild(b); });
}
function clearChips(){ chipsBox.innerHTML=''; }

function nextStep(){
  if(step===0){ botSay('Xin chào 👋 Mình là trợ lý ghi nhận phản hồi của Mindful Key. Bạn muốn gửi loại phản hồi nào ạ?',()=>showChips(CATEGORIES)); }
  else if(step===1){ botSay('Bạn mô tả cụ thể giúp mình nội dung phản hồi nhé. Càng chi tiết, đội phụ trách càng dễ xử lý.'); }
  else if(step===2){ botSay('Cảm ơn bạn. Cho mình xin <b>tên</b> của bạn để tiện xưng hô (gõ "bỏ qua" nếu muốn ẩn danh).'); }
  else if(step===3){ botSay('Bạn để lại <b>email hoặc số điện thoại</b> để đội Mindful Key phản hồi lại nhé (gõ "bỏ qua" nếu không muốn).'); }
  else if(step===4){ submitTicket(); }
}
function handleUser(text){
  addBubble(text,'user'); const val=text.trim();
  if(step===0){ ticket.type=val; step=1; nextStep(); }
  else if(step===1){ if(val.length<5){ botSay('Bạn mô tả thêm một chút giúp mình nhé (ít nhất vài từ).'); return; } ticket.content=val; step=2; nextStep(); }
  else if(step===2){ ticket.name=/^bỏ qua$/i.test(val)?'':val; step=3; nextStep(); }
  else if(step===3){ ticket.contact=/^bỏ qua$/i.test(val)?'':val; step=4; nextStep(); }
}
function makeTicketId(){
  const d=new Date(), p=n=>String(n).padStart(2,'0'), rnd=Math.floor(Math.random()*900+100);
  return `GNH-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${rnd}`;
}
function submitTicket(){
  const id=makeTicketId();
  const payload={ ticket_id:id, loai:ticket.type, noi_dung:ticket.content, ten:ticket.name,
    lien_he:ticket.contact, thoi_gian:new Date().toISOString(), trang:location.href };
  input.disabled=true; sendBtn.disabled=true; typing();
  fetch(SHEET_ENDPOINT,{ method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) })
    .then(()=>finish(id,true)).catch(()=>finish(id,false));
}
function finish(id,ok){
  stopTyping();
  botSay(ok?'Đã ghi nhận phản hồi của bạn thành công! ✅':'Mình đã lưu phản hồi của bạn. ✅',()=>{
    const card=document.createElement('div'); card.className='ticket';
    card.innerHTML=`<small>Mã phiếu của bạn</small><div class="tid">${id}</div><small>Vui lòng lưu lại mã này để tra cứu khi cần.</small>`;
    stream.appendChild(card); scrollDown();
    botSay('Cảm ơn bạn rất nhiều 🌿 Bạn có muốn gửi thêm phản hồi khác không?',()=>{
      showChips(['Gửi phản hồi khác']); chipsBox.firstChild.onclick=()=>resetChat();
      input.disabled=false; sendBtn.disabled=false;
    });
  });
}
function resetChat(){ clearChips(); ticket.type=ticket.content=ticket.name=ticket.contact=''; step=0; nextStep(); }

function submitInput(){ const val=input.value.trim(); if(!val||step===0) return; input.value=''; input.style.height='auto'; handleUser(val); }
sendBtn.addEventListener('click',submitInput);
input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submitInput(); } });
input.addEventListener('input',()=>{ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,110)+'px'; });

document.getElementById('headAvatar').innerHTML=GNH_LOGO;
document.getElementById('brandmark').innerHTML=GNH_LOGO;
nextStep();
</script>
</body>
</html>
