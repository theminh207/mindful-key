# XcodeGen — nguồn thật của MindfulKey.xcodeproj (KHÔNG commit .xcodeproj sinh ra, xem .gitignore).
# Build settings tham chiếu từ project.pbxproj gốc (OpenKey/Sources/OpenKey/macOS/OpenKey.xcodeproj)
# để giữ hành vi build y hệt, chỉ đổi tên/bundle-id/đường dẫn cho cấu trúc mới.
name: MindfulKey

options:
  deploymentTarget:
    macOS: "13.0"   # nâng từ 10.15 (2026-07-18, báo cáo 0.2.1 mục E) — xem giải thích ở MACOSX_DEPLOYMENT_TARGET dưới
    iOS: "16.0"   # khớp SDK đã dùng để verify core/engine build được cho iOS (xem bmad-output/ios/tech-spec.md)

configs:
  Debug: debug
  Release: release

targets:
  MindfulKey:
    type: application
    platform: macOS

    # [MINDFUL] 2026-07-18 — scheme khai TƯỜNG MINH để XcodeGen ghi hẳn file .xcscheme.
    # Không khai thì `make build` (-scheme MindfulKey) sống nhờ cơ chế "tự chế scheme" của
    # xcodebuild — Xcode 26.5 tự chế cho 2 target iOS nhưng bỏ rơi target macOS này →
    # "The project ... does not contain a scheme named MindfulKey" (lỗi có sẵn, không phụ
    # thuộc nội dung project.yml — đã cô lập bằng git stash 2 chiều).
    scheme: {}

    # XcodeGen KHÔNG có khoá `resources:` riêng ở target — mọi file/folder liệt kê trong
    # `sources:` được tự phân loại theo phần mở rộng (mã nguồn -> Compile Sources, còn lại
    # như .xcassets/.storyboard/.png/.icns -> Copy Bundle Resources). Info.plist và
    # entitlements bị excludes vì đã tiêu thụ qua INFOPLIST_FILE/CODE_SIGN_ENTITLEMENTS —
    # để lọt vào đây sẽ bị Xcode copy thừa 1 bản vào Contents/Resources.
    sources:
      - path: ../../core/engine
      - path: ../../core/mood
      - path: macos
      - path: shared
        excludes:
          - "*.md"
      - path: Resources
        excludes:
          - "Info.plist"
          - "MindfulKey.entitlements"
      # [MINDFUL] Batch "Hệ thống + Chuông" — pane "Hệ thống" hiện số phiên bản THẬT đọc từ file
      # này lúc chạy (SystemSettingsView.mm, CurrentVersionString()), KHÔNG đọc
      # CFBundleShortVersionString ($(MARKETING_VERSION) dưới đây đang LỆCH version.env — không sửa
      # ở batch này, ngoài phạm vi UI). Không có extension nhận diện là mã nguồn nên XcodeGen tự xếp
      # vào Copy Bundle Resources — đọc được cả từ bản đã cài /Applications, không chỉ lúc chạy Xcode.
      - path: ../../version.env

    dependencies:
      - sdk: Carbon.framework
      - sdk: AppKit.framework
      - sdk: ServiceManagement.framework
      - sdk: CoreGraphics.framework
      - sdk: Cocoa.framework
      - sdk: EventKit.framework
      - sdk: Foundation.framework
      - sdk: IOKit.framework
      - sdk: Security.framework
      - sdk: UserNotifications.framework
      - sdk: UniformTypeIdentifiers.framework   # UTType cho allowedContentTypes (thay allowedFileTypes deprecated, sàn 13.0)
      - sdk: libsqlite3.tbd
      - sdk: libc++.tbd

    settings:
      base:
        PRODUCT_NAME: MindfulKey
        PRODUCT_BUNDLE_IDENTIFIER: vn.gnh.mindfulkey   # đề xuất — đổi ở đây nếu chủ dự án muốn ID khác
        MARKETING_VERSION: "0.1.0"                     # CHỈ là fallback cho xcodebuild trần (vd CI verify build). Bản THẬT: make build + package_app.sh bơm version.env đè lên (2026-07-19). Đừng tin số này = số phát hành.
        CURRENT_PROJECT_VERSION: "1"    # chỉ là mặc định cho build dev — bản đóng gói được package_app.sh đè bằng số commit (git rev-list --count)
        # Nâng 10.15 → 13.0 (2026-07-18, báo cáo 0.2.1 mục E): khai 10.15 trong khi (a) chưa từng
        # test máy nào dưới 14.8.3, (b) "Bật cùng hệ thống" dưới macOS 13 đã chết sẵn — SMAppService
        # cần 13+, nhánh dự phòng dựa Helper "com.tuyenmai.OpenKeyHelper" không tồn tại trong
        # project (AppDelegate.m tự ghi chú), (c) build bằng SDK mới trên CI cho target 10.15 là
        # vùng không ai kiểm chứng. 13.0 = sàn thấp nhất mà MỌI tính năng thật sự chạy đủ.
        # Muốn hỗ trợ máy cũ hơn THẬT: hạ lại số này + test thật trên máy/VM đời đó (FRICTION-LOG 2026-07-18).
        MACOSX_DEPLOYMENT_TARGET: "13.0"

        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/MindfulKey.entitlements

        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++14"          # giữ như gốc (project.pbxproj)
        CLANG_CXX_LIBRARY: "libc++"
        GCC_C_LANGUAGE_STANDARD: gnu11

        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../../core/engine"
          - "$(SRCROOT)/../../core/mood"

        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

        COMBINE_HIDPI_IMAGES: YES   # Resources dùng PNG rời + hậu tố @2x thủ công (không phải asset catalog)

        # Ký AD-HOC — không có Developer ID/Apple Developer Program (xem docs/INSTALL.md)
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_HARDENED_RUNTIME: NO
        # DEVELOPMENT_TEAM: cố ý bỏ trống/không khai báo (không dùng team gốc 8S7348QV8Q của tác giả OpenKey)

  # ===== iOS — Round 1 walking skeleton (đội iOS, xem bmad-output/ios/tech-spec.md) =====
  # Sở hữu: platforms/apple/ios/**, platforms/apple/shared/** — KHÔNG đụng target MindfulKey
  # (macOS) hay core/ ở trên.
  MindfulKeyiOS:
    type: application
    platform: iOS

    # KHÔNG cần core/engine/core/mood ở đây — container app Round 1 không gọi engine trực
    # tiếp (chỉ UI onboarding + đọc App Group). Chỉ keyboard extension mới gõ chữ.
    sources:
      - path: ios/App
      - path: shared
        excludes:
          - "*.md"

    dependencies:
      - target: MindfulKeyKeyboard
        embed: true
      - sdk: UIKit.framework
      - sdk: Foundation.framework
      - sdk: Security.framework   # story 3.1: MoodJournalStore đọc khóa Keychain chia sẻ (container đọc summary)

    settings:
      base:
        PRODUCT_NAME: MindfulKeyiOS
        PRODUCT_BUNDLE_IDENTIFIER: vn.gnh.mindfulkey.ios   # đề xuất — đổi nếu chủ dự án muốn ID khác
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only ở Round 1
        ONLY_ACTIVE_ARCH: YES        # chỉ build kiến trúc Simulator đang chạy (arm64 trên máy Apple Silicon) — khớp mặc định template Xcode, tránh build thừa x86_64

        INFOPLIST_FILE: ios/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: ios/App/MindfulKeyiOS.entitlements   # App Group group.vn.gnh.mindfulkey (story 1.6)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # ios/App/Assets.xcassets/AppIcon (placeholder từ brand/svg/AppIcon-ios-light.svg — chờ chốt Q10b)

        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++14"   # shared/ có EngineKeyMap.mm (Obj-C++)
        CLANG_CXX_LIBRARY: "libc++"

        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/shared"

        # Ký AD-HOC, build cho Simulator — chưa cần Apple Developer Program (Round 1)
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  MindfulKeyKeyboard:
    type: app-extension
    platform: iOS

    sources:
      - path: ../../core/engine
      - path: ../../core/mood
      - path: ios/KeyboardExtension
      - path: shared
        excludes:
          - "*.md"

    dependencies:
      - sdk: UIKit.framework
      - sdk: Foundation.framework
      - sdk: QuartzCore.framework   # story 2.5: CAShapeLayer/CABasicAnimation/CATransaction cho con sóng ambient (SuggestionBarView)
      - sdk: CoreGraphics.framework # story 2.5: CGRectGetWidth/Height cho path sóng
      - sdk: AudioToolbox.framework # story 2.6: AudioServicesPlaySystemSound cho chuông nhắc nghỉ (NudgeCoordinatorIOS)
      - sdk: Security.framework    # story 3.1: MoodJournalStore — khóa AES trong Keychain (SecItemAdd/CopyMatching/SecRandomCopyBytes)
      - sdk: libc++.tbd

    settings:
      base:
        PRODUCT_NAME: MindfulKeyKeyboard
        PRODUCT_BUNDLE_IDENTIFIER: vn.gnh.mindfulkey.ios.keyboard
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1"
        ONLY_ACTIVE_ARCH: YES

        INFOPLIST_FILE: ios/KeyboardExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ios/KeyboardExtension/KeyboardExtension.entitlements   # CÙNG App Group group.vn.gnh.mindfulkey (story 1.6)

        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++14"
        CLANG_CXX_LIBRARY: "libc++"
        GCC_C_LANGUAGE_STANDARD: gnu11

        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../../core/engine"
          - "$(SRCROOT)/../../core/mood"
          - "$(SRCROOT)/shared"

        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
