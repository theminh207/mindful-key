# Release: gắn tag v* -> build universal, ký thật (Developer ID) + notarize, đóng .dmg,
# xuất dSYM, rồi tự đăng GitHub Release với đủ asset (giống cấu trúc repo tham chiếu haynoi).
#
# Cần cấu hình trước — Settings > Secrets and variables > Actions (secrets riêng của REPO
# NÀY, không tự dùng chung với repo khác dù cùng 1 tài khoản Apple Developer):
#   APPLE_CERTIFICATE_P12_BASE64   `base64 -i DeveloperIDApplication.p12 | pbcopy`
#   APPLE_CERTIFICATE_PASSWORD     mật khẩu đặt lúc export .p12 từ Keychain Access
#   APPLE_SIGNING_IDENTITY         "Developer ID Application: Ten (TEAMID)"
#   APPLE_TEAM_ID                  Team ID 10 ký tự
#   APPLE_API_KEY_ID               App Store Connect API Key ID
#   APPLE_API_ISSUER_ID            App Store Connect Issuer ID
#   APPLE_API_KEY_P8_BASE64        `base64 -i AuthKey_XXXX.p8 | pbcopy`
#
# Xem checklist đầy đủ (kể cả phần chỉ làm thủ công được, VD lấy cert lần đầu): docs/RELEASE.md
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Vỏ Windows build ở đây chứ không phải máy chủ dự án: máy dev là macOS, không chạy được MSVC.
  # Runner windows-latest có sẵn VS 2022 (toolset v143) mà OpenKey.vcxproj đòi. Job này CHỈ đóng
  # gói — nó KHÔNG ký Authenticode (chưa có chứng chỉ; xem docs/FRICTION-LOG.md), nên bộ cài tải
  # về sẽ bị SmartScreen cảnh báo "Unknown publisher". Đúng thân phận hiện tại của bản macOS
  # (ad-hoc, chưa notarize) — không giấu.
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Đối chiếu tag với version.env (chặn lệch phiên bản)
        shell: bash
        run: |
          source version.env
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "$VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION không khớp version.env (VERSION=$VERSION)." >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # Chỉ target OpenKey (app chính), KHÔNG build OpenKeyUpdate — updater gốc của OpenKey,
      # ngoài phạm vi bản phát hành này.
      - name: Build app Windows (Release x64)
        run: >
          msbuild platforms\windows\win32\OpenKey\OpenKey.sln
          /t:OpenKey /p:Configuration=Release /p:Platform=x64 /verbosity:normal

      - name: Tìm .exe vừa build (không đoán đường dẫn OutDir)
        shell: bash
        run: |
          EXE=$(find platforms/windows -name "MindfulKey.exe" -type f | head -1)
          if [[ -z "$EXE" ]]; then
            echo "::error::Build xong nhưng không tìm thấy MindfulKey.exe — OutDir khác dự đoán." >&2
            find platforms/windows -name "*.exe" -type f || true
            exit 1
          fi
          echo "Tìm thấy: $EXE"
          echo "SOURCE_EXE=$(cygpath -w "$(pwd)/$EXE")" >> "$GITHUB_ENV"

      - name: Đóng bộ cài (Inno Setup)
        shell: bash
        run: |
          choco install innosetup --no-progress -y

          # Không đoán đường dẫn ISCC.exe — cùng lý do bước "Tìm .exe vừa build" ở trên không đoán
          # OutDir. Choco đổi thư mục cài (Inno 7, hoặc Program Files thay vì Program Files (x86))
          # là hardcode gãy ngay, mà lỗi sẽ đọc thành "release hỏng" chứ không ai ngờ tới cái path.
          ISCC=""
          for p in "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" \
                   "/c/Program Files/Inno Setup 6/ISCC.exe" \
                   "$(command -v iscc 2>/dev/null || true)"; do
            if [[ -n "$p" && -f "$p" ]]; then ISCC="$p"; break; fi
          done
          if [[ -z "$ISCC" ]]; then
            ISCC=$(find "/c/Program Files (x86)" "/c/Program Files" -maxdepth 3 -name "ISCC.exe" -type f 2>/dev/null | head -1)
          fi
          if [[ -z "$ISCC" ]]; then
            echo "::error::Cài Inno Setup xong nhưng không tìm thấy ISCC.exe — choco đổi đường dẫn?" >&2
            exit 1
          fi
          echo "Dùng: $ISCC"

          mkdir -p release-out
          # Lỗi của iscc PHẢI đi ra annotation: log run cần quyền mới đọc (API trả 403), annotation
          # thì công khai. windows.yml đã học bài này; bước đây thì chưa — nên vòng đầu của v0.3.0
          # chết đúng ở đây và không ai đọc được vì sao.
          set +e
          # MSYS2_ARG_CONV_EXCL="*": TẮT phép dịch tham số của Git Bash. Bash tự biến mọi tham số
          # mở đầu bằng `/` thành đường dẫn Windows, nên `/DMyAppVersion=...` hoá ra một đường dẫn
          # và ISCC báo "You may not specify more than one script filename" — đúng cái bẫy đã cắn
          # MSBuild ở windows.yml (MSB1008). MSBuild thoát được vì nó nhận cả cờ `-`; ISCC CHỈ nhận
          # `/`, nên phải tắt hẳn phép dịch. ĐỪNG gỡ dòng env này.
          MSYS2_ARG_CONV_EXCL="*" "$ISCC" \
            "/DMyAppVersion=$VERSION" \
            "/DSourceExe=$SOURCE_EXE" \
            platforms/windows/installer/MindfulKey.iss > iscc.log 2>&1
          iscc_code=$?
          echo "----- iscc.log -----"; cat iscc.log; echo "--------------------"
          if [ $iscc_code -ne 0 ]; then
            python3 - <<'PY_ERR'
          lines = open("iscc.log", encoding="utf-8", errors="ignore").read().splitlines()
          hits = [l.strip() for l in lines if "rror" in l or "annot" in l or "not found" in l.lower()]
          if not hits:
              hits = [l.strip() for l in lines[-12:] if l.strip()]
          seen = set()
          for l in hits[:12]:
              if l not in seen:
                  seen.add(l); print("::error::" + l)
          PY_ERR
            exit $iscc_code
          fi
          set -e

          # [MINDFUL] Bản tên ổn định cho Windows — ĐỐI XỨNG với MindfulKey.dmg bên macOS. Nút tải
          # trên web cần 1 địa chỉ không đổi qua từng version (releases/latest/download/...), nếu
          # không thì mỗi lần phát hành lại phải sửa tay landing page. Nội dung y hệt bản có version;
          # người dùng vẫn biết mình đang cài bản nào vì bộ cài tự hiện "Mindful Key <ver>".
          cp "release-out/MindfulKey_${VERSION}_x64-setup.exe" "release-out/MindfulKey-setup.exe"
          ls -lh release-out/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: |
            release-out/MindfulKey_*_x64-setup.exe
            release-out/MindfulKey-setup.exe
          if-no-files-found: error

  release:
    runs-on: macos-latest
    needs: build-windows   # bộ cài Windows phải sẵn sàng trước, để đăng CÙNG 1 Release
    steps:
      - uses: actions/checkout@v4
        with:
          # Đủ lịch sử cho package_app.sh đếm số build (CFBundleVersion = git rev-list --count).
          # Checkout nông (mặc định) đếm ra 1 — script tự chặn trên CI để khỏi phát hành số sai.
          fetch-depth: 0

      - name: Đối chiếu tag với version.env (chặn lệch phiên bản)
        run: |
          source version.env
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "$VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION không khớp version.env (VERSION=$VERSION). Bump version.env trong cùng PR trước khi gắn tag." >&2
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      # Nếu repo chưa cấu hình secrets ký (APPLE_SIGNING_IDENTITY rỗng) -> build ad-hoc
      # (KHÔNG notarize). Cho phép ra release thử để xem pipeline chạy trước khi có Developer ID.
      # Cấu hình đủ 7 secrets (xem docs/RELEASE.md) -> tự động chuyển sang ký thật + notarize.
      - name: Phát hiện có secrets ký hay không
        id: signing
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -n "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Chưa có secrets ký Apple — build AD-HOC (chưa notarize). Người tải về sẽ bị Gatekeeper chặn. Xem docs/RELEASE.md để bật ký thật."
          fi

      - name: Import Developer ID certificate vào keychain tạm
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo -n "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Ghi App Store Connect API key ra file tạm
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AppStoreConnectAPIKey.p8"
          echo -n "$APPLE_API_KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Chạy release.sh (test -> build universal -> [ký -> notarize] -> đóng gói)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          if [[ "${{ steps.signing.outputs.available }}" == "true" ]]; then
            bash scripts/release.sh
          else
            SKIP_SIGN=1 bash scripts/release.sh
          fi

      - name: Dọn keychain tạm (không để sót key ký trên runner)
        if: always() && steps.signing.outputs.available == 'true'
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f "${APPLE_API_KEY_PATH:-}"

      # [MINDFUL] Cảnh báo Windows chạy LUÔN, không phụ thuộc secrets ký của Apple: bộ cài .exe
      # chưa ký Authenticode nên SmartScreen sẽ chặn, và điều đó đúng dù Apple có ký hay không.
      # Trước đây khối này chỉ nói về Gatekeeper — tức bản đầu tiên CÓ bộ cài Windows lại im lặng
      # về đúng thứ người dùng Windows đập mặt vào đầu tiên.
      - name: Chèn cảnh báo vào release notes
        run: |
          {
            if [[ "${{ steps.signing.outputs.available }}" != "true" ]]; then
              echo "> ⚠️ **macOS — bản ad-hoc, CHƯA notarize.** Người tải về sẽ bị Gatekeeper chặn"
              echo "> (\"không thể xác minh nhà phát triển\"). Chỉ dùng để tự test. Bản ký thật +"
              echo "> notarize sẽ có khi cấu hình xong Developer ID — xem docs/RELEASE.md."
              echo ""
            fi
            echo "> ⚠️ **Windows — bộ cài CHƯA ký Authenticode.** SmartScreen sẽ hiện \"Windows"
            echo "> protected your PC / Unknown publisher\". Muốn chạy: bấm **More info → Run anyway**."
            echo ">"
            echo "> ⚠️ **CHƯA AI CHẠY BẢN WINDOWS NÀY.** CI chứng minh nó biên dịch được, KHÔNG chứng"
            echo "> minh nó chạy đúng. Đây là bản để **thử**, không phải bản để dùng hằng ngày."
            echo ">"
            echo "> **Lớp cảm xúc TẮT SẴN trên Windows** (macOS/iOS thì bật). Không phải quên bật:"
            echo "> hook bàn phím của Windows thấy mọi phím kể cả ô mật khẩu, và Windows không có cơ"
            echo "> chế nào chặn như Secure Input Mode của macOS. Bật là lựa chọn có ý thức, và app"
            echo "> sẽ nói thẳng điều này lúc bạn bật. Đang vá."
            echo ""
            cat release-out/release-notes.md
          } > release-out/release-notes-final.md
          mv release-out/release-notes-final.md release-out/release-notes.md

      # Ưu tiên PAT cá nhân (secret RELEASE_PAT) để Release hiện tên chủ tài khoản thay vì bot
      # "github-actions". Nhưng KHÔNG chặn phát hành khi chưa có PAT: trước đây bước này gán cứng
      # `GITHUB_TOKEN: secrets.RELEASE_PAT`, nên repo chưa cấu hình secret là token rỗng → `gh`
      # không auth được → v0.2.1 build xong xuôi (universal + DMG + dSYM đều đạt) rồi chết đúng ở
      # động tác đăng, 3 lần liên tiếp, và runner bị xoá nên mọi asset mất trắng. Nay thiếu PAT thì
      # lùi về github.token (workflow đã có `permissions: contents: write`) — bản vẫn ra được, chỉ
      # đứng tên bot; cắm RELEASE_PAT vào lúc nào là tự động đứng tên cá nhân lại từ bản kế tiếp.
      # Tải bộ cài Windows từ job build-windows về đây, SAU khi release.sh đã dựng xong
      # release-out/ (chạy trước sẽ bị script dọn mất).
      - name: Lấy bộ cài Windows từ job build-windows
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: release-out/

      - name: Đăng GitHub Release
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          DEFAULT_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.signing.outputs.available }}" != "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          echo "Asset chuẩn bị đăng:"
          ls -lh release-out/ || true

          publish() {
            # Dọn TRƯỚC khi đăng: xoá mọi release NHÁP (draft) v* còn sót — draft là sản phẩm phụ
            # của pipeline (bản hỏng / lần chạy dở), giữ lại là mìn: lỡ tay Publish nhầm draft cũ là
            # người dùng lãnh bộ cài hỏng (suýt xảy ra thật với v0.3.0). Chủ dự án chốt 2026-07-18:
            # "đồng ý xoá luôn". CHỈ đụng draft (chưa ai thấy) — KHÔNG BAO GIỜ đụng release đã publish.
            DELETED=0
            for id in $(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
                          --jq '.[] | select(.draft == true) | select(.tag_name | startswith("v")) | .id' 2>/dev/null); do
              if gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$id" >/dev/null 2>&1; then
                DELETED=$((DELETED+1))
              fi
            done
            if [[ "$DELETED" -gt 0 ]]; then
              echo "::notice::Đã dọn $DELETED release nháp v* cũ."
            fi

            # KHÔNG --draft — publish thẳng. Chủ dự án chốt 2026-07-18 ("để tự động luôn") sau hai
            # lần draft nằm chờ tay bấm. Bản chưa ký vẫn mang --prerelease + cảnh báo trong notes,
            # nên "tự động" không có nghĩa là im lặng về rủi ro.
            gh release create "$GITHUB_REF_NAME" \
              --title "MindfulKey $GITHUB_REF_NAME" \
              --notes-file release-out/release-notes.md \
              $PRERELEASE_FLAG \
              release-out/MindfulKey-*.dmg \
              release-out/MindfulKey.dmg \
              release-out/MindfulKey-*-universal.zip \
              release-out/MindfulKey-*-universal.dSYM.zip \
              release-out/MindfulKey_*_x64-setup.exe \
              release-out/MindfulKey-setup.exe
          }

          # PAT trước (Release đứng tên chủ tài khoản). PAT hết hạn / thiếu quyền `contents:write`
          # KHÔNG được phép chặn phát hành: v0.2.1 đã chết 3 lần liên tiếp đúng ở đây trong khi app
          # build sạch, và asset mất trắng theo runner. Lỗi thật của `gh` phải nổi lên annotation —
          # log run chỉ đọc được khi có quyền, còn annotation thì API công khai đọc được, nên đây là
          # đường DUY NHẤT để biết vì sao hỏng mà không phải đoán.
          if [[ -n "$RELEASE_PAT" ]]; then
            export GITHUB_TOKEN="$RELEASE_PAT"
            if ERR=$(publish 2>&1); then
              echo "Đã đăng bằng RELEASE_PAT — Release đứng tên chủ tài khoản."
              echo "::notice::Release ĐÃ PUBLISH công khai (tự động, không còn bước bấm tay). Link tải ổn định releases/latest/download/... đã sống."
              exit 0
            fi
            echo "::warning::RELEASE_PAT có mặt nhưng đăng không được (hết hạn hoặc thiếu quyền Contents: Read and write) — lùi về token mặc định. Lỗi gh: ${ERR//$'\n'/ | }"
            gh release delete "$GITHUB_REF_NAME" --yes >/dev/null 2>&1 || true
          else
            echo "::warning::Chưa có secret RELEASE_PAT — đăng bằng token mặc định, Release sẽ đứng tên bot github-actions."
          fi

          export GITHUB_TOKEN="$DEFAULT_TOKEN"
          if ERR=$(publish 2>&1); then
            echo "Đã đăng bằng token mặc định — Release đứng tên bot github-actions."
            echo "::notice::Release ĐÃ PUBLISH công khai (tự động, không còn bước bấm tay). Link tải ổn định releases/latest/download/... đã sống."
            exit 0
          fi
          echo "::error::Đăng thất bại với CẢ HAI token. Lỗi gh: ${ERR//$'\n'/ | }"
          exit 1
