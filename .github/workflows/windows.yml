# CI: build vỏ Windows (MSVC v143) + regression engine.
#
# Vì sao có file này: máy dev của dự án là macOS — KHÔNG chạy được trình biên dịch
# của Microsoft. Runner `windows-latest` của GitHub cài sẵn Visual Studio 2022
# (toolset v143, đúng thứ `OpenKey.vcxproj` đòi), nên nó đóng vai "máy Windows
# đi mượn" để build-verify vỏ Windows mà không cần ai phải có PC.
#
# Nó KHÔNG thay được người: gõ thử tiếng Việt ra dấu vẫn phải có mắt người nhìn
# trên Windows thật. CI chỉ chứng minh compile + link sạch. Xem docs/TEST_MATRIX.md
# để biết hành vi nào đã có bằng chứng tới đâu.
name: Windows

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'platforms/windows/**'
      - 'tests/core/**'
      - '.github/workflows/windows.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'platforms/windows/**'
      - 'tests/core/**'
      - '.github/workflows/windows.yml'
  workflow_dispatch:   # cho phép bấm chạy tay từ tab Actions, không cần push

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false   # Release hỏng thì vẫn phải thấy Debug ra sao, và ngược lại
      matrix:
        configuration: [ Debug, Release ]

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # Bộ não C++ dùng chung — cùng 5 case Telex như macOS CI (tests/core/build.sh),
      # nhưng biên dịch bằng MSVC thay vì clang, và DataType.h rẽ nhánh `_WIN32` →
      # `platforms/win32.h`. Đây là lần đầu nhánh shim đó được biên dịch trong CI:
      # macOS CI luôn rơi vào nhánh `#else` → mac.h, không bao giờ chạm win32.h.
      # Cờ khớp build.sh: c++14 + include dir trỏ vào core/engine.
      - name: Regression engine (bộ não dùng chung, MSVC)
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSPATH=%%i"
          if not defined VSPATH ( echo Khong tim thay Visual Studio qua vswhere & exit /b 1 )
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat" || exit /b 1
          cl /EHsc /std:c++14 /I core\engine /Fe:test_engine.exe ^
            tests\core\test_engine.cpp ^
            core\engine\Engine.cpp core\engine\Vietnamese.cpp ^
            core\engine\Macro.cpp core\engine\SmartSwitchKey.cpp core\engine\ConvertTool.cpp || exit /b 1
          test_engine.exe || exit /b 1

      # Chỉ nhắm target `OpenKey` (app chính). Build qua .sln để $(SolutionDir)
      # resolve đúng, nhưng KHÔNG build `OpenKeyUpdate` (updater gốc OpenKey,
      # ngoài phạm vi Mốc 1 — hỏng ở đó không được phép chặn app chính).
      #
      # Lỗi compiler PHẢI đi ra annotation (`::error::`), không chỉ nằm trong log: log của run cần
      # quyền mới đọc được (API trả 403), còn annotation thì API CÔNG KHAI đọc được. Đây là bài
      # học `release.yml` đã ghi sẵn — và nó vừa cắn thật: run Windows đầu tiên fail lúc 23:12
      # ngày 16/07, annotation chỉ nói "exit code 1", nên không ai biết vì sao hỏng. Máy dev là
      # macOS, không chạy lại MSVC được, nên đây là ĐƯỜNG DUY NHẤT để thấy lỗi mà không phải đoán.
      # CỐ Ý không `set -e` và cố ý lọc lỗi bằng Python chứ không bash: bản trước bật lại `set -e`
      # ngay trước khối in lỗi, nên chỉ cần 1 lệnh trả non-zero là script chết TRƯỚC khi kịp bắn
      # annotation — hỏng đúng lúc cần nó nhất, và ta lại mù thêm một vòng.
      - name: Build app Windows (${{ matrix.configuration }} x64)
        shell: bash
        run: |
          set +e
          # `microsoft/setup-msbuild` cắm MSBuild vào PATH cho PowerShell/cmd, KHÔNG cho bash —
          # bước này chạy shell bash (để xử lý lỗi bằng Python), nên gọi thẳng `msbuild` là
          # "command not found", và ta lại tưởng code Windows hỏng. Tự dò bằng vswhere, đúng cách
          # bước engine ở trên đang dùng (bước đó PASS => cách này đã được chứng minh trên runner).
          VSWHERE="/c/Program Files (x86)/Microsoft Visual Studio/Installer/vswhere.exe"
          MSBUILD_WIN=$("$VSWHERE" -latest -products '*' -requires Microsoft.Component.MSBuild \
                        -find 'MSBuild\**\Bin\MSBuild.exe' | head -1 | tr -d '\r')
          if [[ -z "$MSBUILD_WIN" ]]; then
            echo "::error::vswhere không tìm thấy MSBuild.exe trên runner"
            exit 1
          fi
          MSBUILD=$(cygpath -u "$MSBUILD_WIN")
          echo "MSBuild: $MSBUILD"

          "$MSBUILD" "platforms/windows/win32/OpenKey/OpenKey.sln" \
            /t:OpenKey \
            /p:Configuration=${{ matrix.configuration }} \
            /p:Platform=x64 \
            /nologo /verbosity:normal > msbuild.log 2>&1
          code=$?
          echo "msbuild thoát với mã: $code"
          echo "----- 150 dòng cuối msbuild.log -----"
          tail -150 msbuild.log
          echo "-------------------------------------"

          # Log run cần quyền mới đọc (API trả 403) — annotation thì API CÔNG KHAI đọc được. Máy
          # dev là macOS nên đây là đường DUY NHẤT để thấy lỗi MSVC mà không phải đoán.
          python3 - "$code" <<'PY'
          import re, sys
          code = int(sys.argv[1])
          if code == 0:
              sys.exit(0)
          try:
              lines = open("msbuild.log", encoding="utf-8", errors="ignore").read().splitlines()
          except OSError:
              print("::error::Không mở nổi msbuild.log — msbuild có thể chưa từng chạy")
              sys.exit(0)
          pat = re.compile(r"error [A-Z]+\d+|fatal error|MSB\d{4}|cannot open|No such file")
          hits = [l.strip() for l in lines if pat.search(l)]
          # Không khớp mẫu nào -> vẫn phải nói được gì đó: lấy đuôi log.
          if not hits:
              hits = [l.strip() for l in lines[-25:] if l.strip()]
          seen = set()
          for l in hits[:25]:
              if l in seen:
                  continue
              seen.add(l)
              print("::error::" + l)
          PY
          exit $code

      - name: Thu .exe build ra
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mindful-key-windows-${{ matrix.configuration }}-x64
          path: platforms/windows/win32/OpenKey/**/*.exe
          if-no-files-found: error   # không tìm thấy .exe = thất bại thật, đừng im lặng cho qua
